name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_DENY_VERSION: "0.19.8"
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.90.0"

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: openhoo/hooversion/actions/lint@f5ee7eef255519b4ef33f4a93c7223805113c3a2 # v0.1.1
        with:
          version: 0.1.1

  rust:
    name: Rust checks
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_VERSION"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

  cargo-deny:
    name: Dependency policy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "$CARGO_DENY_VERSION"

      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check advisories bans licenses sources
